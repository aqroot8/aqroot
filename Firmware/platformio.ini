; AQROOT firmware — PlatformIO project
;
; Two environments share the same source tree:
;   * esp32-s3-aqroot : real-hardware build, flashed over USB via PlatformIO.
;   * wokwi           : identical firmware built with -DSIMULATION_MODE so radio/NFC/
;                       audio return realistic mock data. Used with wokwi.toml +
;                       diagram.json to test the whole UI in the browser with no hardware.
;
; FRAMEWORK: Arduino core for ESP32. Chosen over ESP-IDF so we get mature, drop-in
; libraries (LVGL, LovyanGFX, RadioLib, Adafruit PN532, I2S) instead of hand-rolling
; register code. FreeRTOS is still underneath — the Arduino core runs on top of ESP-IDF.

[common]
; Pinned to the 6.x line (Arduino-ESP32 2.0.x / ESP-IDF 4.4). This keeps the legacy
; driver/i2s.h API used by audio.cpp valid — the 7.x line (Arduino 3.x / IDF 5.x) removed
; it in favour of driver/i2s_std.h. Bump deliberately, not implicitly.
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL picks up include/lv_conf.h via a simple include (see include/lv_conf.h).
    ; The -I is required so the separately-compiled LVGL *library* sees lv_conf.h too;
    ; PlatformIO only adds include/ to the application build, not to library builds.
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    ; LovyanGFX v1 API.
    -DLGFX_USE_V1

lib_deps =
    lvgl/lvgl @ ^8.3.0
    jgromes/RadioLib @ ^6.4.0
    adafruit/Adafruit PN532 @ ^1.3.3
    adafruit/Adafruit BusIO @ ^1.14.0
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    lovyan03/LovyanGFX @ ^1.1.0
    ; --- IMU (6-axis accel + gyro) ---
    ; The final IMU part is not locked (BMI270 vs ICM-42670 — see "01 - Hardware Core.md").
    ; BMI270 in particular needs a multi-KB config blob uploaded at init, and no single
    ; BMI270 Arduino library is reliably resolvable on the PlatformIO registry today.
    ; To keep this project building TODAY, sensors.cpp reads a generic 6-axis IMU over I2C
    ; with only the Wire library (no external dep). When the exact part is chosen, add its
    ; dedicated library here and swap the register map in sensors.cpp. Example candidates:
    ;   boschsensortec/BMI270-Sensor-API
    ;   sparkfun/SparkFun BMI270 Arduino Library

; ----------------------------------------------------------------------------------------
; Real hardware
[env:esp32-s3-aqroot]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags = ${common.build_flags}
lib_deps = ${common.lib_deps}

; ----------------------------------------------------------------------------------------
; Wokwi simulation build. Same firmware; SIMULATION_MODE swaps radio/NFC/audio for mock
; data and enables physical-button navigation (Wokwi has no CST816 touch model).
[env:wokwi]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DSIMULATION_MODE
lib_deps = ${common.lib_deps}
